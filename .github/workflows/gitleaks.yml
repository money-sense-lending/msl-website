name: gitleaks

# Scans every push and PR for committed secrets (API keys, tokens, passwords,
# connection strings, etc). Uses the gitleaks CLI directly — the popular
# gitleaks-action wrapper requires a paid license on org repos, but the CLI
# itself is MIT-licensed and free.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan all commits in the PR

      - name: install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar xz -C /usr/local/bin gitleaks

      - name: scan repo
        run: gitleaks detect --source . --verbose --redact
